name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    name: Typecheck & Lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --force

      - name: Typecheck (renderer)
        run: npx tsc -p tsconfig.web.json --noEmit

      - name: Typecheck (main process)
        run: npx tsc -p tsconfig.node.json --noEmit

      - name: Lint
        run: npx eslint "src/**/*.{ts,tsx}" "electron/**/*.ts" --max-warnings 20

      - name: Test
        run: npx vitest run
