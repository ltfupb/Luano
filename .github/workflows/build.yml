name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.8.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --force

      - name: Download sidecar binaries
        run: npx ts-node scripts/download-binaries.ts ${{ matrix.platform }}

      - name: Build & Package (Windows)
        if: matrix.platform == 'win'
        run: npx electron-vite build && npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}

      - name: Build & Package (Mac)
        if: matrix.platform == 'mac'
        run: npx electron-vite build && npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build & Package (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-vite build && npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
