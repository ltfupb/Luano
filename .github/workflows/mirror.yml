name: Mirror to Public

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    name: Sync to public repo

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone public repo
        run: git clone https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/ltfupb/Luano.git /tmp/public

      - name: Sync files (exclude Pro)
        run: |
          rsync -av --delete \
            --exclude-from='.mirror-exclude' \
            --filter='protect .git/' \
            ./ /tmp/public/

      - name: Push changes
        run: |
          cd /tmp/public
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to mirror"
            exit 0
          fi

          COMMIT_MSG=$(git -C $GITHUB_WORKSPACE log -1 --pretty=%s)
          git commit -m "mirror: $COMMIT_MSG"
          git push
